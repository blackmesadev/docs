<div class="bm-codeblock">
	<div class="bm-codeblock-header">
		{% if title is defined and title %}
		<span class="bm-codeblock-title">{{ title }}</span>
		{% elif lang is defined and lang %}
		<span class="bm-codeblock-lang">{{ lang }}</span>
		{% endif %}
		<button class="bm-copy-btn" type="button" aria-label="Copy to clipboard">Copy</button>
	</div>
	<div class="bm-codeblock-body">
		{% set source = body | trim %}
		<pre><code{% if lang is defined and lang %} class="language-{{ lang }}"{% endif %}>{{ source | escape }}</code></pre>
	</div>
</div>
